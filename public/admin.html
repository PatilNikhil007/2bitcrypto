<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="favicon.ico" />
    <title>2BitCrypto Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #060c14;
        --surface: #0c1623;
        --surface2: #101e30;
        --border: rgba(255, 255, 255, 0.08);
        --border2: rgba(255, 255, 255, 0.13);
        --text: #dce9ff;
        --muted: #6a85a8;
        --green: #2ecc8f;
        --yellow: #f5c842;
        --red: #f05070;
        --blue: #4fa3ff;
        --purple: #7d58ff;
        --cyan: #41d7ff;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Syne", sans-serif;
        min-height: 100vh;
      }

      /* ── Login ── */
      #loginScreen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            ellipse at 30% 20%,
            rgba(125, 88, 255, 0.18),
            transparent 50%
          ),
          radial-gradient(
            ellipse at 70% 80%,
            rgba(65, 215, 255, 0.12),
            transparent 50%
          ),
          var(--bg);
      }
      .login-box {
        width: 360px;
        padding: 40px 36px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .login-box h1 {
        font-size: 1.5rem;
        font-weight: 800;
      }
      .login-box h1 span {
        color: var(--cyan);
      }
      .login-box p {
        color: var(--muted);
        font-size: 0.9rem;
      }

      /* ── Forms ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .field label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.09em;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 11px 13px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 11px;
        color: var(--text);
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.88rem;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus,
      textarea:focus,
      select:focus {
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(79, 163, 255, 0.1);
      }
      textarea {
        resize: vertical;
      }

      /* ── Buttons ── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 10px 18px;
        border-radius: 999px;
        font-weight: 700;
        font-family: "Syne", sans-serif;
        font-size: 0.86rem;
        border: 1px solid transparent;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.15s;
        text-decoration: none;
        white-space: nowrap;
      }
      .btn:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        transform: none;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--purple), var(--blue));
        color: #fff;
      }
      .btn-ghost {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border-color: var(--border);
      }
      .btn-green {
        background: rgba(46, 204, 143, 0.14);
        color: var(--green);
        border-color: rgba(46, 204, 143, 0.3);
      }
      .btn-red {
        background: rgba(240, 80, 112, 0.12);
        color: var(--red);
        border-color: rgba(240, 80, 112, 0.3);
      }
      .btn-yellow {
        background: rgba(245, 200, 66, 0.12);
        color: var(--yellow);
        border-color: rgba(245, 200, 66, 0.3);
      }
      .btn-cyan {
        background: rgba(65, 215, 255, 0.1);
        color: var(--cyan);
        border-color: rgba(65, 215, 255, 0.25);
      }
      .btn-sm {
        padding: 6px 13px;
        font-size: 0.78rem;
      }
      .btn-full {
        width: 100%;
      }
      #loginErr {
        color: var(--red);
        font-size: 0.85rem;
        display: none;
      }

      /* ── App layout ── */
      #app {
        display: none;
        min-height: 100vh;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 13px 28px;
        background: rgba(6, 12, 20, 0.9);
        backdrop-filter: blur(18px);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 11px;
        font-weight: 800;
        font-size: 1.05rem;
        min-width: 0;
      }
      .topbar-brand img {
        flex-shrink: 0;
      }
      .admin-badge {
        padding: 3px 9px;
        border-radius: 999px;
        background: rgba(240, 80, 112, 0.14);
        color: var(--red);
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 0.85rem;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      /* ── Tabs ── */
      .tab-bar {
        display: flex;
        gap: 4px;
        padding: 18px 28px 0;
        border-bottom: 1px solid var(--border);
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .tab-bar::-webkit-scrollbar {
        display: none;
      }
      .tab-btn {
        white-space: nowrap;
        flex-shrink: 0;
      }

      @media (max-width: 640px) {
        .topbar {
          padding: 10px 14px;
          gap: 10px;
        }
        .topbar-brand {
          font-size: 0.95rem;
          gap: 9px;
        }
        .topbar-brand img {
          width: 30px !important;
          height: 30px !important;
        }
        .admin-badge {
          font-size: 0.6rem;
          padding: 2px 7px;
        }
        .topbar-right {
          gap: 6px;
          width: 100%;
          justify-content: space-between;
          font-size: 0.78rem;
        }
        #lastRefresh {
          flex: 1;
          min-width: 0;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .tab-bar {
          padding: 14px 14px 0;
        }
        .tab-btn {
          padding: 9px 14px;
          font-size: 0.82rem;
        }
        .content {
          padding: 16px 14px 40px !important;
        }
      }
      .tab-btn {
        padding: 10px 20px;
        border-radius: 12px 12px 0 0;
        background: transparent;
        border: 1px solid transparent;
        border-bottom: none;
        color: var(--muted);
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        cursor: pointer;
        transition: all 0.15s;
      }
      .tab-btn:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.03);
      }
      .tab-btn.active {
        color: var(--text);
        background: var(--surface);
        border-color: var(--border);
        border-bottom-color: var(--surface);
        margin-bottom: -1px;
      }
      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }

      /* ── Content ── */
      .content {
        max-width: 1380px;
        margin: 0 auto;
        padding: 24px 24px 48px;
      }

      /* ── Stats strip ── */
      .stats-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
      }
      .stat-card .label {
        color: var(--muted);
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 5px;
      }
      .stat-card .value {
        font-size: 1.7rem;
        font-weight: 800;
        line-height: 1;
      }
      .stat-card .value.green {
        color: var(--green);
      }
      .stat-card .value.yellow {
        color: var(--yellow);
      }
      .stat-card .value.red {
        color: var(--red);
      }

      /* ── Filter bar ── */
      .filter-bar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .filter-btn {
        padding: 7px 15px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: "Syne", sans-serif;
        font-weight: 600;
        font-size: 0.82rem;
        cursor: pointer;
        transition: all 0.15s;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: rgba(79, 163, 255, 0.12);
        border-color: var(--blue);
        color: var(--blue);
      }
      .filter-btn.active-green {
        background: rgba(46, 204, 143, 0.12);
        border-color: var(--green);
        color: var(--green);
      }
      .filter-btn.active-yellow {
        background: rgba(245, 200, 66, 0.12);
        border-color: var(--yellow);
        color: var(--yellow);
      }
      .filter-btn.active-red {
        background: rgba(240, 80, 112, 0.12);
        border-color: var(--red);
        color: var(--red);
      }
      .filter-bar-right {
        margin-left: auto;
        color: var(--muted);
        font-size: 0.82rem;
      }

      /* ── Submission cards ── */
      .submissions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .sub-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        transition: border-color 0.2s;
      }
      .sub-card:hover {
        border-color: var(--border2);
      }
      .sub-card.status-approved {
        border-left: 3px solid var(--green);
      }
      .sub-card.status-rejected {
        border-left: 3px solid var(--red);
      }
      .sub-card.status-pending {
        border-left: 3px solid var(--yellow);
      }

      .sub-header {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        padding: 14px 18px;
        cursor: pointer;
        user-select: none;
      }
      .sub-header:hover {
        background: rgba(255, 255, 255, 0.02);
      }
      .sub-id {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.72rem;
        color: var(--muted);
        min-width: 130px;
      }
      .sub-pkg {
        font-weight: 700;
        font-size: 0.92rem;
        flex: 1;
        min-width: 120px;
      }
      .sub-price {
        font-family: "IBM Plex Mono", monospace;
        font-weight: 600;
        color: var(--cyan);
        font-size: 0.88rem;
      }
      .sub-contact {
        color: var(--muted);
        font-size: 0.85rem;
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sub-date {
        font-size: 0.75rem;
        color: var(--muted);
        white-space: nowrap;
      }
      .chevron {
        color: var(--muted);
        font-size: 0.75rem;
        transition: transform 0.2s;
        margin-left: auto;
      }
      .sub-card.expanded .chevron {
        transform: rotate(180deg);
      }

      .sub-body {
        display: none;
        padding: 0 18px 18px;
        border-top: 1px solid var(--border);
      }
      .sub-card.expanded .sub-body {
        display: block;
      }
      .sub-body-inner {
        padding-top: 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 700px) {
        .sub-body-inner {
          grid-template-columns: 1fr;
        }
      }

      .detail-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .detail-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .detail-row .key {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.09em;
      }
      .detail-row .val {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.83rem;
        word-break: break-all;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 10px;
      }
      .detail-row .val a {
        color: var(--blue);
        text-decoration: none;
      }
      .detail-row .val a:hover {
        text-decoration: underline;
      }
      .detail-row .val.notes {
        font-family: "Syne", sans-serif;
        font-size: 0.88rem;
        white-space: pre-wrap;
      }

      .tx-box {
        grid-column: 1/-1;
        border-radius: 12px;
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .tx-box-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 11px 14px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid var(--border);
      }
      .tx-box-header .title {
        font-weight: 700;
        font-size: 0.88rem;
      }
      .tx-box-body {
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .tx-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }
      .tx-row .k {
        color: var(--muted);
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        min-width: 76px;
      }
      .tx-row .v {
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.81rem;
        word-break: break-all;
      }
      .tx-error {
        color: var(--red);
        font-size: 0.84rem;
      }
      .tx-amount {
        color: var(--green);
        font-weight: 700;
        font-size: 0.98rem;
      }

      .actions-bar {
        grid-column: 1/-1;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding-top: 4px;
        border-top: 1px solid var(--border);
        margin-top: 4px;
      }
      .note-row {
        grid-column: 1/-1;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .note-row .key {
        font-size: 0.72rem;
        font-weight: 700;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.09em;
      }
      .note-row textarea {
        min-height: 56px;
        font-size: 0.84rem;
      }

      /* ── Badges ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 9px;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .badge-pending {
        background: rgba(245, 200, 66, 0.12);
        color: var(--yellow);
        border: 1px solid rgba(245, 200, 66, 0.25);
      }
      .badge-approved {
        background: rgba(46, 204, 143, 0.12);
        color: var(--green);
        border: 1px solid rgba(46, 204, 143, 0.25);
      }
      .badge-rejected {
        background: rgba(240, 80, 112, 0.12);
        color: var(--red);
        border: 1px solid rgba(240, 80, 112, 0.25);
      }
      .badge-valid {
        background: rgba(46, 204, 143, 0.1);
        color: var(--green);
        border: 1px solid rgba(46, 204, 143, 0.2);
      }
      .badge-invalid {
        background: rgba(240, 80, 112, 0.1);
        color: var(--red);
        border: 1px solid rgba(240, 80, 112, 0.2);
      }
      .badge-unchecked {
        background: rgba(106, 133, 168, 0.1);
        color: var(--muted);
        border: 1px solid rgba(106, 133, 168, 0.2);
      }
      .badge-active {
        background: rgba(46, 204, 143, 0.1);
        color: var(--green);
        border: 1px solid rgba(46, 204, 143, 0.2);
      }
      .badge-inactive {
        background: rgba(106, 133, 168, 0.1);
        color: var(--muted);
        border: 1px solid rgba(106, 133, 168, 0.15);
      }

      /* ── Plans tab ── */
      .plans-layout {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 20px;
        align-items: start;
      }
      @media (max-width: 900px) {
        .plans-layout {
          grid-template-columns: 1fr;
        }
      }

      .section-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 22px;
      }
      .section-title {
        font-size: 1rem;
        font-weight: 800;
        margin-bottom: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .section-title span {
        color: var(--muted);
        font-size: 0.8rem;
        font-weight: 600;
      }

      .plan-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .plan-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px 18px;
        display: grid;
        gap: 10px;
      }
      .plan-card.inactive {
        opacity: 0.55;
      }
      .plan-card-header {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .plan-card-header .plan-name {
        font-weight: 800;
        font-size: 1rem;
        flex: 1;
      }
      .plan-card-header .plan-price {
        font-family: "IBM Plex Mono", monospace;
        color: var(--cyan);
        font-weight: 700;
      }
      .plan-desc {
        color: var(--muted);
        font-size: 0.87rem;
        line-height: 1.55;
      }
      .plan-bullets {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .plan-bullets li {
        font-size: 0.84rem;
        color: var(--muted);
      }
      .plan-bullets li::before {
        content: "•";
        color: var(--cyan);
        margin-right: 7px;
      }
      .plan-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        padding-top: 6px;
        border-top: 1px solid var(--border);
      }

      /* plan form */
      .plan-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .form-row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .bullets-editor {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .bullet-row {
        display: flex;
        gap: 7px;
        align-items: center;
      }
      .bullet-row input {
        flex: 1;
      }
      .add-bullet-btn {
        font-size: 0.82rem;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .toggle-row label {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--muted);
      }
      .toggle {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
        vertical-align: middle;
      }
      .toggle input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        padding: 0;
        margin: 0;
        border: 0;
        background: transparent;
        pointer-events: none;
      }
      .toggle-slider {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.2s;
        overflow: hidden;
        box-sizing: border-box;
      }
      .toggle-slider::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--muted);
        transition:
          transform 0.2s,
          background 0.2s;
        box-sizing: border-box;
      }
      .toggle input:checked + .toggle-slider {
        background: rgba(46, 204, 143, 0.35);
      }
      .toggle input:checked + .toggle-slider::after {
        transform: translateX(18px);
        background: var(--green);
      }

      /* config card */
      .config-form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      /* empty state */
      .empty-state {
        text-align: center;
        padding: 48px 20px;
        color: var(--muted);
        border: 1px dashed var(--border);
        border-radius: 16px;
      }
      .empty-state .icon {
        font-size: 2.2rem;
        margin-bottom: 10px;
      }

      /* spinner */
      .spinner {
        display: inline-block;
        width: 13px;
        height: 13px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: var(--blue);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* toast */
      #toast {
        position: fixed;
        bottom: 26px;
        right: 26px;
        z-index: 100;
        padding: 11px 18px;
        border-radius: 13px;
        font-weight: 600;
        font-size: 0.88rem;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.22s,
          transform 0.22s;
        pointer-events: none;
      }
      #toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      #toast.success {
        background: rgba(46, 204, 143, 0.18);
        border: 1px solid rgba(46, 204, 143, 0.35);
        color: var(--green);
      }
      #toast.error {
        background: rgba(240, 80, 112, 0.18);
        border: 1px solid rgba(240, 80, 112, 0.35);
        color: var(--red);
      }
      #toast.info {
        background: rgba(79, 163, 255, 0.15);
        border: 1px solid rgba(79, 163, 255, 0.3);
        color: var(--blue);
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 18px 0;
      }
    </style>
  </head>
  <body>
    <!-- ── LOGIN ─────────────────────────────────────────────────────────────── -->
    <div id="loginScreen">
      <div class="login-box">
        <div>
          <h1>2BitCrypto <span>Admin</span></h1>
          <p style="margin-top: 6px">Submissions & plans dashboard</p>
        </div>
        <div class="field">
          <label>Admin Token</label>
          <input
            type="password"
            id="tokenInput"
            placeholder="Enter admin token"
            autocomplete="current-password"
            value="admin"
          />
        </div>
        <div id="loginErr">Invalid token. Try again.</div>
        <button class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
      </div>
    </div>

    <!-- ── APP ───────────────────────────────────────────────────────────────── -->
    <div id="app">
      <div class="topbar">
        <div class="topbar-brand">
          <img
            src="https://pbs.twimg.com/profile_images/2040505802029498368/z58Q8Xtp_400x400.png"
            style="
              width: 34px;
              height: 34px;
              border-radius: 50%;
              object-fit: cover;
            "
            alt="logo"
          />
          2BitCrypto
          <span class="admin-badge">Admin</span>
        </div>
        <div class="topbar-right">
          <span id="lastRefresh">—</span>
          <button class="btn btn-ghost btn-sm" id="refreshBtn">
            ↻ Refresh
          </button>
          <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
        </div>
      </div>

      <div class="tab-bar">
        <button class="tab-btn active" data-tab="submissions">
          Submissions
        </button>
        <button class="tab-btn" data-tab="plans">Plans & Config</button>
      </div>

      <!-- ── SUBMISSIONS TAB ─────────────────────────────────────────────────── -->
      <div class="tab-panel active" id="tab-submissions">
        <div class="content">
          <div class="stats-strip" id="statsStrip">
            <div class="stat-card">
              <div class="label">Total</div>
              <div class="value" id="statTotal">—</div>
            </div>
            <div class="stat-card">
              <div class="label">Pending</div>
              <div class="value yellow" id="statPending">—</div>
            </div>
            <div class="stat-card">
              <div class="label">Approved</div>
              <div class="value green" id="statApproved">—</div>
            </div>
            <div class="stat-card">
              <div class="label">Rejected</div>
              <div class="value red" id="statRejected">—</div>
            </div>
            <div class="stat-card">
              <div class="label">Tx Verified</div>
              <div class="value green" id="statVerified">—</div>
            </div>
            <div class="stat-card">
              <div class="label">Unverified</div>
              <div class="value red" id="statUnverified">—</div>
            </div>
          </div>

          <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="approved">Approved</button>
            <button class="filter-btn" data-filter="rejected">Rejected</button>
            <button class="filter-btn" data-filter="invalid-tx">
              Unverified Tx
            </button>
            <div class="filter-bar-right">
              <span id="countLabel"></span>
            </div>
          </div>

          <div class="submissions" id="submissionsList">
            <div class="empty-state">
              <div class="icon">📭</div>
              <div>Loading…</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── PLANS TAB ───────────────────────────────────────────────────────── -->
      <div class="tab-panel" id="tab-plans">
        <div class="content">
          <div class="plans-layout">
            <!-- Left: plan list -->
            <div>
              <div class="section-card">
                <div class="section-title">
                  Active Plans
                  <span id="plansCount">—</span>
                </div>
                <div class="plan-list" id="planList">
                  <div class="empty-state">
                    <div class="icon">📦</div>
                    <div>Loading plans…</div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Right: add/edit form + config -->
            <div style="display: flex; flex-direction: column; gap: 16px">
              <!-- Plan form -->
              <div class="section-card" id="planFormCard">
                <div class="section-title" id="planFormTitle">Add New Plan</div>
                <div class="plan-form" id="planForm">
                  <input type="hidden" id="editPlanId" value="" />

                  <div class="form-row-2">
                    <div class="field">
                      <label>Plan Name *</label>
                      <input
                        type="text"
                        id="fName"
                        placeholder="e.g. Full Package"
                      />
                    </div>
                    <div class="field">
                      <label>Display Price *</label>
                      <input type="text" id="fPrice" placeholder="e.g. $5000" />
                    </div>
                  </div>

                  <div class="form-row-2">
                    <div class="field">
                      <label>USDT Value minimum for TX</label>
                      <input
                        type="number"
                        id="fPriceUsd"
                        placeholder="5000"
                        min="0"
                        step="1"
                      />
                    </div>
                    <div class="field" style="justify-content: flex-end">
                      <div class="toggle-row">
                        <label for="fActive">Active (visible on site)</label>
                        <label class="toggle">
                          <input type="checkbox" id="fActive" checked />
                          <span class="toggle-slider"></span>
                        </label>
                      </div>
                    </div>
                  </div>

                  <div class="field">
                    <label>Description *</label>
                    <textarea
                      id="fDesc"
                      rows="3"
                      placeholder="Short description of this package…"
                    ></textarea>
                  </div>

                  <div class="field">
                    <label>Bullet points</label>
                    <div class="bullets-editor" id="bulletsEditor"></div>
                    <button
                      class="btn btn-ghost btn-sm add-bullet-btn"
                      type="button"
                      id="addBulletBtn"
                      style="margin-top: 6px; align-self: flex-start"
                    >
                      + Add bullet
                    </button>
                  </div>

                  <div style="display: flex; gap: 8px; flex-wrap: wrap">
                    <button class="btn btn-primary" id="savePlanBtn">
                      Save Plan
                    </button>
                    <button
                      class="btn btn-ghost"
                      id="cancelEditBtn"
                      style="display: none"
                    >
                      Cancel
                    </button>
                  </div>
                  <div
                    id="planFormMsg"
                    style="font-size: 0.84rem; min-height: 18px"
                  ></div>
                </div>
              </div>

              <!-- Site config -->
              <div class="section-card">
                <div class="section-title">Payment Config</div>
                <div class="config-form" id="configForm">
                  <div class="field">
                    <label>Payment Note (shown in modal)</label>
                    <input
                      type="text"
                      id="cNote"
                      placeholder="e.g. Pay with USDT ETH"
                    />
                  </div>
                  <div class="field">
                    <label>Payment Wallet Address *</label>
                    <input type="text" id="cWallet" placeholder="0x…" />
                  </div>
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 10px;
                      flex-wrap: wrap;
                    "
                  >
                    <button class="btn btn-cyan" id="saveConfigBtn">
                      Save Config
                    </button>
                    <div id="configMsg" style="font-size: 0.84rem"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- /#app -->

    <div id="toast"></div>

    <script>
      // ─────────────────────────────────────────────────────────────────────────────
      // State
      // ─────────────────────────────────────────────────────────────────────────────
      let adminToken = "";
      let submissions = [];
      let plans = [];
      let siteConfig = {};
      let activeFilter = "all";
      let editingPlanId = null;
      let bulletCount = 0;

      // ─────────────────────────────────────────────────────────────────────────────
      // Auth
      // ─────────────────────────────────────────────────────────────────────────────
      document.getElementById("loginBtn").addEventListener("click", tryLogin);
      document.getElementById("tokenInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") tryLogin();
      });

      async function tryLogin() {
        const token = document.getElementById("tokenInput").value.trim();
        if (!token) return;
        document.getElementById("loginErr").style.display = "none";
        try {
          const res = await fetch("/api/admin/submissions", {
            headers: { "x-admin-token": token },
          });
          if (!res.ok) {
            document.getElementById("loginErr").style.display = "block";
            return;
          }
          adminToken = token;
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("app").style.display = "block";
          const data = await res.json();
          setSubmissions(data.submissions);
          await loadPlans();
        } catch {
          document.getElementById("loginErr").style.display = "block";
        }
      }

      document.getElementById("logoutBtn").addEventListener("click", () => {
        adminToken = "";
        submissions = [];
        plans = [];
        document.getElementById("loginScreen").style.display = "flex";
        document.getElementById("app").style.display = "none";
        document.getElementById("tokenInput").value = "";
      });

      // ─────────────────────────────────────────────────────────────────────────────
      // Tabs
      // ─────────────────────────────────────────────────────────────────────────────
      document.querySelectorAll(".tab-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".tab-btn")
            .forEach((b) => b.classList.remove("active"));
          document
            .querySelectorAll(".tab-panel")
            .forEach((p) => p.classList.remove("active"));
          btn.classList.add("active");
          document
            .getElementById("tab-" + btn.dataset.tab)
            .classList.add("active");
        });
      });

      // ─────────────────────────────────────────────────────────────────────────────
      // Submissions
      // ─────────────────────────────────────────────────────────────────────────────
      document
        .getElementById("refreshBtn")
        .addEventListener("click", async () => {
          await Promise.all([loadSubmissions(), loadPlans()]);
        });

      async function loadSubmissions() {
        try {
          const res = await fetch("/api/admin/submissions", {
            headers: { "x-admin-token": adminToken },
          });
          if (!res.ok) return;
          const data = await res.json();
          setSubmissions(data.submissions);
          document.getElementById("lastRefresh").textContent =
            "Updated " + new Date().toLocaleTimeString();
        } catch {
          toast("Failed to load submissions", "error");
        }
      }

      function setSubmissions(list) {
        submissions = (list || []).sort(
          (a, b) => new Date(b.submittedAt) - new Date(a.submittedAt)
        );
        updateStats();
        renderList();
      }

      function updateStats() {
        document.getElementById("statTotal").textContent = submissions.length;
        document.getElementById("statPending").textContent = submissions.filter(
          (s) => s.status === "pending"
        ).length;
        document.getElementById("statApproved").textContent =
          submissions.filter((s) => s.status === "approved").length;
        document.getElementById("statRejected").textContent =
          submissions.filter((s) => s.status === "rejected").length;
        document.getElementById("statVerified").textContent =
          submissions.filter((s) => s.txValidation?.valid).length;
        document.getElementById("statUnverified").textContent =
          submissions.filter((s) => !s.txValidation?.valid).length;
      }

      // Filters
      document.querySelectorAll("[data-filter]").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll("[data-filter]")
            .forEach((b) =>
              b.classList.remove(
                "active",
                "active-green",
                "active-yellow",
                "active-red"
              )
            );
          activeFilter = btn.dataset.filter;
          const cls =
            activeFilter === "approved"
              ? "active-green"
              : activeFilter === "pending"
                ? "active-yellow"
                : activeFilter === "rejected" || activeFilter === "invalid-tx"
                  ? "active-red"
                  : "active";
          btn.classList.add(cls);
          renderList();
        });
      });

      function filtered() {
        if (activeFilter === "all") return submissions;
        if (activeFilter === "invalid-tx")
          return submissions.filter((s) => !s.txValidation?.valid);
        return submissions.filter((s) => s.status === activeFilter);
      }

      function renderList() {
        const list = filtered();
        document.getElementById("countLabel").textContent =
          `${list.length} submission${list.length !== 1 ? "s" : ""}`;
        if (!list.length) {
          document.getElementById("submissionsList").innerHTML =
            `<div class="empty-state"><div class="icon">📭</div><div>No submissions match this filter</div></div>`;
          return;
        }
        document.getElementById("submissionsList").innerHTML = list
          .map(renderSubCard)
          .join("");
        document
          .querySelectorAll(".sub-header")
          .forEach((h) =>
            h.addEventListener("click", () =>
              h.closest(".sub-card").classList.toggle("expanded")
            )
          );
        document.querySelectorAll("[data-action]").forEach((btn) =>
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            handleSubAction(btn.dataset.action, btn.dataset.id);
          })
        );
      }

      function renderSubCard(s) {
        const tx = s.txValidation || {};
        const txBadge = !tx.checked
          ? `<span class="badge badge-unchecked">Not checked</span>`
          : tx.valid
            ? `<span class="badge badge-valid">✓ Verified</span>`
            : `<span class="badge badge-invalid">✗ Unverified</span>`;
        const statusBadge = `<span class="badge badge-${s.status}">${s.status}</span>`;
        const date = s.submittedAt
          ? new Date(s.submittedAt).toLocaleString()
          : "—";

        const txBody = tx.checked
          ? tx.valid
            ? `<div class="tx-row"><span class="k">Amount</span><span class="v tx-amount">${tx.amount || "—"}</span></div>
         <div class="tx-row"><span class="k">From</span><span class="v">${tx.from || "—"}</span></div>
         <div class="tx-row"><span class="k">To</span><span class="v">${tx.to || "—"}</span></div>
         ${tx.timestamp ? `<div class="tx-row"><span class="k">Block time</span><span class="v">${new Date(tx.timestamp).toLocaleString()}</span></div>` : ""}`
            : `<div class="tx-error">⚠ ${tx.error || "Unknown error"}</div>
         ${tx.from ? `<div class="tx-row" style="margin-top:7px"><span class="k">From</span><span class="v">${tx.from}</span></div>` : ""}
         ${tx.to ? `<div class="tx-row"><span class="k">To</span><span class="v">${tx.to}</span></div>` : ""}`
          : `<div style="color:var(--muted);font-size:.84rem">Not yet validated.</div>`;

        return `<div class="sub-card status-${s.status}" data-id="${s.id}">
    <div class="sub-header">
      <div class="sub-id">${s.id}</div>
      <div class="sub-pkg">${s.packageName}</div>
      <div class="sub-price">${s.packagePrice}</div>
      <div class="sub-contact">${esc(s.contact)}</div>
      ${statusBadge} ${txBadge}
      <div class="sub-date">${date}</div>
      <div class="chevron">▼</div>
    </div>
    <div class="sub-body">
      <div class="sub-body-inner">
        <div class="detail-group">
          <div class="detail-row"><span class="key">Contact</span><div class="val">${esc(s.contact)}</div></div>
          <div class="detail-row"><span class="key">Project link</span><div class="val"><a href="${esc(s.projectLink)}" target="_blank" rel="noreferrer">${esc(s.projectLink)}</a></div></div>
          <div class="detail-row"><span class="key">Start date</span><div class="val">${esc(s.startDate)}</div></div>
          <div class="detail-row"><span class="key">Transaction ID</span><div class="val"><a href="https://etherscan.io/tx/${esc(s.transactionId)}" target="_blank" rel="noreferrer">${esc(s.transactionId)}</a></div></div>
        </div>
        <div class="detail-group">
          <div class="detail-row"><span class="key">Notes</span><div class="val notes">${esc(s.notes) || "—"}</div></div>
          ${s.adminNote ? `<div class="detail-row"><span class="key">Admin note</span><div class="val notes">${esc(s.adminNote)}</div></div>` : ""}
        </div>
        <div class="tx-box">
          <div class="tx-box-header"><span class="title">Transaction Validation</span>${txBadge}</div>
          <div class="tx-box-body">${txBody}</div>
        </div>
        <div class="note-row">
          <span class="key">Admin note (saved on status change)</span>
          <textarea id="note_${s.id}" placeholder="Internal note…">${esc(s.adminNote || "")}</textarea>
        </div>
        <div class="actions-bar">
          ${s.status !== "approved" ? `<button class="btn btn-green btn-sm" data-action="approve" data-id="${s.id}">✓ Approve</button>` : ""}
          ${s.status !== "rejected" ? `<button class="btn btn-red btn-sm" data-action="reject" data-id="${s.id}">✗ Reject</button>` : ""}
          ${s.status !== "pending" ? `<button class="btn btn-yellow btn-sm" data-action="pending" data-id="${s.id}">↩ Pending</button>` : ""}
          <button class="btn btn-ghost btn-sm" data-action="revalidate" data-id="${s.id}">⟳ Re-validate Tx</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--red);border-color:rgba(240,80,112,.3);" data-action="delete" data-id="${s.id}">🗑 Delete</button>
        </div>
      </div>
    </div>
  </div>`;
      }

      async function handleSubAction(action, id) {
        if (action === "approve") await setSubStatus(id, "approved");
        else if (action === "reject") await setSubStatus(id, "rejected");
        else if (action === "pending") await setSubStatus(id, "pending");
        else if (action === "revalidate") await revalidateTx(id);
        else if (action === "delete") await deleteSubmission(id);
      }

      async function setSubStatus(id, status) {
        const note = document.getElementById(`note_${id}`)?.value || "";
        try {
          const res = await fetch(`/api/admin/submissions/${id}`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              "x-admin-token": adminToken,
            },
            body: JSON.stringify({ status, adminNote: note }),
          });
          if (!res.ok) throw new Error();
          const data = await res.json();
          const idx = submissions.findIndex((s) => s.id === id);
          if (idx !== -1) submissions[idx] = data.submission;
          updateStats();
          renderList();
          toast(`Marked as ${status}`, "success");
        } catch {
          toast("Failed to update status", "error");
        }
      }

      async function revalidateTx(id) {
        const btn = document.querySelector(
          `[data-action="revalidate"][data-id="${id}"]`
        );
        if (btn) {
          btn.disabled = true;
          btn.innerHTML = '<span class="spinner"></span> Validating…';
        }
        try {
          const res = await fetch(`/api/admin/submissions/${id}/revalidate`, {
            method: "POST",
            headers: { "x-admin-token": adminToken },
          });
          if (!res.ok) throw new Error();
          const data = await res.json();
          const idx = submissions.findIndex((s) => s.id === id);
          if (idx !== -1) submissions[idx].txValidation = data.txValidation;
          updateStats();
          renderList();
          toast(
            data.txValidation.valid
              ? "Transaction verified ✓"
              : "Still invalid — check details",
            data.txValidation.valid ? "success" : "error"
          );
        } catch {
          toast("Revalidation failed", "error");
          if (btn) {
            btn.disabled = false;
            btn.textContent = "⟳ Re-validate Tx";
          }
        }
      }

      async function deleteSubmission(id) {
        if (!confirm("Delete this submission permanently?")) return;
        try {
          const res = await fetch(`/api/admin/submissions/${id}`, {
            method: "DELETE",
            headers: { "x-admin-token": adminToken },
          });
          if (!res.ok) throw new Error();
          submissions = submissions.filter((s) => s.id !== id);
          updateStats();
          renderList();
          toast("Submission deleted", "info");
        } catch {
          toast("Failed to delete", "error");
        }
      }

      // ─────────────────────────────────────────────────────────────────────────────
      // Plans
      // ─────────────────────────────────────────────────────────────────────────────
      async function loadPlans() {
        try {
          const res = await fetch("/api/admin/plans", {
            headers: { "x-admin-token": adminToken },
          });
          if (!res.ok) return;
          const data = await res.json();
          plans = data.plans || [];
          siteConfig = data.config || {};
          renderPlanList();
          populateConfigForm();
        } catch {
          toast("Failed to load plans", "error");
        }
      }

      function renderPlanList() {
        document.getElementById("plansCount").textContent =
          `${plans.length} total`;
        if (!plans.length) {
          document.getElementById("planList").innerHTML =
            `<div class="empty-state"><div class="icon">📦</div><div>No plans yet. Add one →</div></div>`;
          return;
        }
        document.getElementById("planList").innerHTML = plans
          .map(
            (p) => `
    <div class="plan-card ${p.active ? "" : "inactive"}">
      <div class="plan-card-header">
        <div class="plan-name">${esc(p.name)}</div>
        <div class="plan-price">${esc(p.price)}</div>
        <span class="badge ${p.active ? "badge-active" : "badge-inactive"}">${p.active ? "Active" : "Hidden"}</span>
      </div>
      <div class="plan-desc">${esc(p.description)}</div>
      ${p.bullets?.length ? `<ul class="plan-bullets">${p.bullets.map((b) => `<li>${esc(b)}</li>`).join("")}</ul>` : ""}
      <div class="plan-actions">
        <button class="btn btn-ghost btn-sm" onclick="startEditPlan('${p.id}')">✏ Edit</button>
        <button class="btn ${p.active ? "btn-yellow" : "btn-green"} btn-sm" onclick="togglePlanActive('${p.id}', ${!p.active})">${p.active ? "⊘ Hide" : "✓ Show"}</button>
        <button class="btn btn-red btn-sm" onclick="deletePlan('${p.id}')">🗑 Delete</button>
      </div>
    </div>`
          )
          .join("");
      }

      function populateConfigForm() {
        document.getElementById("cWallet").value =
          siteConfig.paymentWallet || "";
        document.getElementById("cNote").value = siteConfig.paymentNote || "";
      }

      // Bullet editor
      function addBulletRow(value = "") {
        bulletCount++;
        const id = `bullet_${bulletCount}`;
        const row = document.createElement("div");
        row.className = "bullet-row";
        row.id = `row_${id}`;
        row.innerHTML = `
    <input type="text" id="${id}" value="${esc(value)}" placeholder="Bullet point text…" />
    <button class="btn btn-ghost btn-sm" type="button" onclick="document.getElementById('row_${id}').remove()">✕</button>
  `;
        document.getElementById("bulletsEditor").appendChild(row);
      }

      function getBullets() {
        return Array.from(document.querySelectorAll("#bulletsEditor input"))
          .map((i) => i.value.trim())
          .filter(Boolean);
      }

      document
        .getElementById("addBulletBtn")
        .addEventListener("click", () => addBulletRow());

      function clearPlanForm() {
        editingPlanId = null;
        document.getElementById("editPlanId").value = "";
        document.getElementById("fName").value = "";
        document.getElementById("fPrice").value = "";
        document.getElementById("fPriceUsd").value = "";
        document.getElementById("fDesc").value = "";
        document.getElementById("fActive").checked = true;
        document.getElementById("bulletsEditor").innerHTML = "";
        bulletCount = 0;
        document.getElementById("planFormTitle").textContent = "Add New Plan";
        document.getElementById("savePlanBtn").textContent = "Save Plan";
        document.getElementById("cancelEditBtn").style.display = "none";
        document.getElementById("planFormMsg").textContent = "";
      }

      function startEditPlan(id) {
        const plan = plans.find((p) => p.id === id);
        if (!plan) return;
        editingPlanId = id;
        document.getElementById("editPlanId").value = id;
        document.getElementById("fName").value = plan.name;
        document.getElementById("fPrice").value = plan.price;
        document.getElementById("fPriceUsd").value = plan.priceUsd || "";
        document.getElementById("fDesc").value = plan.description;
        document.getElementById("fActive").checked = plan.active;
        document.getElementById("bulletsEditor").innerHTML = "";
        bulletCount = 0;
        (plan.bullets || []).forEach((b) => addBulletRow(b));
        document.getElementById("planFormTitle").textContent = "Edit Plan";
        document.getElementById("savePlanBtn").textContent = "Update Plan";
        document.getElementById("cancelEditBtn").style.display = "";
        document.getElementById("planFormMsg").textContent = "";
        // Scroll form into view
        document
          .getElementById("planFormCard")
          .scrollIntoView({ behavior: "smooth", block: "start" });
      }

      document
        .getElementById("cancelEditBtn")
        .addEventListener("click", clearPlanForm);

      document
        .getElementById("savePlanBtn")
        .addEventListener("click", async () => {
          const name = document.getElementById("fName").value.trim();
          const price = document.getElementById("fPrice").value.trim();
          const priceUsd =
            parseFloat(document.getElementById("fPriceUsd").value) || 0;
          const description = document.getElementById("fDesc").value.trim();
          const active = document.getElementById("fActive").checked;
          const bullets = getBullets();
          const msg = document.getElementById("planFormMsg");

          if (!name || !price || !description) {
            msg.textContent = "Name, price and description are required.";
            msg.style.color = "var(--red)";
            return;
          }

          const btn = document.getElementById("savePlanBtn");
          btn.disabled = true;
          btn.textContent = editingPlanId ? "Updating…" : "Saving…";
          msg.textContent = "";

          try {
            const url = editingPlanId
              ? `/api/admin/plans/${editingPlanId}`
              : "/api/admin/plans";
            const method = editingPlanId ? "PUT" : "POST";
            const res = await fetch(url, {
              method,
              headers: {
                "Content-Type": "application/json",
                "x-admin-token": adminToken,
              },
              body: JSON.stringify({
                name,
                price,
                priceUsd,
                description,
                bullets,
                active,
              }),
            });
            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.error || "Request failed");
            }
            const data = await res.json();
            if (editingPlanId) {
              plans = plans.map((p) =>
                p.id === editingPlanId ? data.plan : p
              );
              toast("Plan updated", "success");
            } else {
              plans.push(data.plan);
              toast("Plan created", "success");
            }
            renderPlanList();
            clearPlanForm();
            msg.textContent = editingPlanId
              ? "Plan updated successfully."
              : "Plan created successfully.";
            msg.style.color = "var(--green)";
          } catch (e) {
            msg.textContent = `Error: ${e.message}`;
            msg.style.color = "var(--red)";
          } finally {
            btn.disabled = false;
            btn.textContent = editingPlanId ? "Update Plan" : "Save Plan";
          }
        });

      async function togglePlanActive(id, active) {
        try {
          const res = await fetch(`/api/admin/plans/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "x-admin-token": adminToken,
            },
            body: JSON.stringify({ active }),
          });
          if (!res.ok) throw new Error();
          const data = await res.json();
          plans = plans.map((p) => (p.id === id ? data.plan : p));
          renderPlanList();
          toast(active ? "Plan set to active" : "Plan hidden", "success");
        } catch {
          toast("Failed to update plan", "error");
        }
      }

      async function deletePlan(id) {
        if (!confirm("Delete this plan? It will no longer appear on the site."))
          return;
        try {
          const res = await fetch(`/api/admin/plans/${id}`, {
            method: "DELETE",
            headers: { "x-admin-token": adminToken },
          });
          if (!res.ok) throw new Error();
          plans = plans.filter((p) => p.id !== id);
          renderPlanList();
          if (editingPlanId === id) clearPlanForm();
          toast("Plan deleted", "info");
        } catch {
          toast("Failed to delete plan", "error");
        }
      }

      // Config save
      document
        .getElementById("saveConfigBtn")
        .addEventListener("click", async () => {
          const paymentWallet = document.getElementById("cWallet").value.trim();
          const paymentNote = document.getElementById("cNote").value.trim();
          const msg = document.getElementById("configMsg");
          const btn = document.getElementById("saveConfigBtn");

          btn.disabled = true;
          btn.textContent = "Saving…";
          msg.textContent = "";

          try {
            const res = await fetch("/api/admin/config", {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "x-admin-token": adminToken,
              },
              body: JSON.stringify({
                paymentWallet,
                paymentNote,
              }),
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "Failed");
            siteConfig = data.config;
            msg.textContent = "Saved ✓";
            msg.style.color = "var(--green)";
            toast("Payment config saved", "success");
          } catch (e) {
            msg.textContent = `Error: ${e.message}`;
            msg.style.color = "var(--red)";
          } finally {
            btn.disabled = false;
            btn.textContent = "Save Config";
          }
        });

      // ─────────────────────────────────────────────────────────────────────────────
      // Helpers
      // ─────────────────────────────────────────────────────────────────────────────
      function esc(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      let toastTimer;
      function toast(msg, type = "info") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = `show ${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
      }

      // Auto-refresh submissions every 60s
      setInterval(() => {
        if (adminToken) loadSubmissions();
      }, 60000);

      // Init bullet editor with one empty row
      addBulletRow();

      // Auto-login with default token
      tryLogin();
    </script>
  </body>
</html>
